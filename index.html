<script type="application/json" id="speaker-notes">
[
  "Cover. Pause for two beats before reading the title. Then: I want to thank you all for the time today. We're here for twenty minutes, three acts, thirteen slides. Daphne is going to take the floor for slides eleven through thirteen, where the legal architecture and the founding-stakeholder structure live. The frame I want you to hold from this first slide is simple — what we are building is the infrastructure the hemp industry has been missing. Not a platform, not an app, not a startup in the conventional sense. INOS is the operating system layer for plant-based industries, and the legal vehicle receiving capital today is INOS Foundation France, a non-profit association incorporating this month.",
  "Act One, slide two. The problem. I want you to hear it from the field, not from me. On April twenty-eighth and twenty-ninth we sent a single email to two hundred and sixty-six hemp professionals across more than thirty countries. Twenty-one unsolicited replies came back inside twenty-four hours — fourteen of them substantive. Industry average for cold B2B outreach is one to three percent. We hit seven point nine. Fourteen out of fourteen substantive replies confirmed the same diagnosis. These are four of them, verbatim. Jeff Kostuik in Canada, on the lack of shared infrastructure. Robert Hertel in Germany, thirty-two years in, telling us we are right and tired. Doctor Miroslava Kavgic at Ottawa, on validated material data for the built environment. Colin Steddy in Australia, twenty years in, ripped off twice, asking to work together. The point is not that they liked the idea — the point is that they articulated the same gap, in their own words, before they had seen a deck.",
  "Slide three. So why hasn't this been built already? Because someone tried. Igor Bogdanovic, in Serbia, six years ago. HempTradeMarket dot com. Hundreds of members, real trade, self-generating to this day. He could not monetise it. Stripe and other payment rails reject companies that have hemp in their title or business — not because the market is illegal, but because there is no verified identity layer letting a processor confirm legitimacy. He could not pay the team that would maintain it. The platform froze. He told us this week, in writing — quote — I still need partners in order to restart it. The infrastructure was missing. Not the demand. That distinction is the entire investment thesis, and Igor's existing membership base is a ready-made pilot population the day SSOT is live.",
  "Act Two. Slide four. What INOS actually is. One paragraph, one diagram. INOS is the protocol layer — think TCP slash IP for plant-based industries. SSOT is the verified knowledge graph that sits on it: actors, regulations, evidence, with provenance. HEMPIN is the first deployment, because hemp is the hardest case in the regenerative space — fifty jurisdictions, contested rules, fragmented operators. DEWII is the community interface where the industry meets. BUD is the AI agent that makes the knowledge accessible. Hover over any layer in this stack — the architecture is deliberately ordered. Hemp is the stress test, but the protocol is designed to be replicated across every regenerative industry.",
  "Slide five. The technology. This is why this is research, not just SaaS. Three open research questions sit underneath the product. One — defeasible regulatory contradiction resolution: when fifty jurisdictions disagree about what hemp is, classical logic collapses. We treat regulations as defeasible rules with priority orderings and resolve contradictions formally. Two — bounded-confidence LLM-to-graph pipelines: large language models hallucinate, knowledge graphs do not, and we bound LLM outputs to the verified graph with explicit confidence intervals on every fact. Three — verification under regulatory uncertainty: what does it mean to verify a producer when the rules themselves are contested? These three questions are the substance of our European public co-funding submission in May. Non-dilutive support for the deep-tech layer.",
  "Slide six. The Regional Bureau model. INOS does not centralize. Each region signs an LOI with the foundation and operates as the in-country bureau. They bind local actors, encode local regulation, and split revenue back to local infrastructure. Thailand has signed. France and Canada are in active discussion — Nathalie Fichaux at InterChanvre, Jeff Kostuik at the Canadian Hemp Trade Alliance. Serbia, Australia and the Czech Republic are interested — Igor Bogdanovic, Colin Steddy, Hana Gabrielova. Six countries in pipeline before any product is live. Every signature compounds the network effect: each new country strengthens the graph for every other country. This is how the protocol spreads globally without being captured by a central operator.",
  "Slide seven. The knowledge economy. This is the piece that makes the whole structure mission-locked rather than extractive. When BUD answers a question, it cites verified knowledge in the graph — and the people who put that knowledge there earn. Researchers, farmers, lab technicians, regulators, activists. NADA points are the unit. They convert into platform credit, regional funding, or for verified contributors a direct royalty stream. The compensation loop is perpetual, the provenance is preserved end to end, and there are zero middlemen between citation and payout. Wealth redistribution is not a feature here. It is the protocol.",
  "Act Three, slide eight. Traction. Not projected — last week. The numbers will count up on screen as I speak. Two hundred and sixty-six emails sent. Twenty-one replies in twenty-four hours. Seven point nine percent response on cold outreach in B2B infrastructure, which is industry-defying. Fourteen out of fourteen substantive replies confirmed the same problem. The list on the left is who replied and what they asked for — Jeff Kostuik at the Canadian Hemp Trade Alliance requesting a call, Marco Fugazza at UNCTAD requesting a call, David Vaillencourt who chairs ASTM D thirty-seven on cannabis offering a pathway into the ASTM ecosystem, Nathalie Fichaux at InterChanvre as a prospective consortium partner, and Igor Bogdanovic asking for an infrastructure partner. The signal is not that people will use this if we build it. The signal is that people are angry it does not exist yet.",
  "Slide nine. The builder. This is why the traction is real. Paul Iglesia has spent years on the ground — at hemp conferences across Europe and Asia, at UNCTAD workshops, in policy rooms and farm fields. The two hundred and sixty-six contacts in the outreach campaign were not bought from a database. They were built, conversation by conversation, over years. The twenty-one replies in twenty-four hours happened because the people who replied already knew Paul was serious, or knew someone who did. That network is the moat. It cannot be replicated by a team that just discovered hemp. Daphne brings the financial architecture and the founding capital. Paul brings the map of who the industry actually is, and the energy to activate it.",
  "Slide ten. The capital stack. There are three sources of capital around this structure, and they do not compete. The largest is the European public co-funding submission going in this May — non-dilutive, funding the deep-tech research. The medium piece is regional bureau revenue, which activates per region as LOIs sign. The smallest piece — and the most urgent — is the bridge round we are pitching right now. Two hundred and fifty thousand euros. The bar chart on the left shows relative scale. Hover any source for detail. The bridge is the smallest part of the structure, and it is the piece that has to close in the next four weeks.",
  "Slide eleven. Daphne, take it. (Daphne presents.) The legal architecture is deliberate. Three jurisdictions, one mission lock. INOS Foundation France — association loi mille neuf cent un, incorporating this month — is the IP holder, the mission custodian, and the entity that signs the consortium agreement. Swiss OpCo, planned for incorporation post-grant, is the commercial exploitation vehicle — that is where convertibles convert and where revenue from licensed deployments flows. Luxembourg SOPARFI is the long-term IP licensing entity, activated when scale justifies the structure. What investors in this bridge round receive — and this is what I want you to take away — are instruments that convert into the Swiss OpCo or accrue royalty rights against the Luxembourg holding. Never equity in the foundation itself. The foundation is uncapturable by design.",
  "Slide twelve. The ask. (Daphne continues, or hand back to Paul.) Two hundred and fifty thousand euros. Six to twelve months of pre-grant runway. Founding-stakeholder recognition recorded in the foundation's constitutive documents. Use of funds is on the left — thirty-five percent foundation incorporation and legal, twenty-eight percent the four-FTE pre-grant team, eighteen percent BUD beta and the SSOT v zero, twelve percent regional bureau onboarding, seven percent reserve. Three instruments are available, and you can blend them. A — convertible note into the Swiss OpCo at the priced round following the public co-funding award, with discount and cap protection, the closest analogue to a SAFE. B — royalty participation through the Luxembourg holding, capped at a multiple of contribution, non-equity. C — advisory contract plus board observer rights at OpCo incorporation, with founding-stakeholder recognition baked into the SSOT graph. Why this month specifically: the foundation incorporates now, the founding stakeholders are recorded in the constitutive documents, and after the public co-funding submission the structure is sealed.",
  "Slide thirteen. Why now, why us. Not a team slide. A conviction slide. The European Union is, right now, building sovereign infrastructure across critical sectors. Hemp is the stress test for regenerative industries — the hardest case, the most fragmented, the most contested. Twenty-one industry experts validated the diagnosis in twenty-four hours. The science is fundable — that is what the public co-funding submission is for. The vehicle is mission-locked — that is what the foundation structure protects against. And the window is real — when the public co-funding submission goes in this May, the founding-stakeholder structure closes. One person already tried, and could not, because the layer below was missing. We are building that layer. On European technology, in the open, with a mission lock that protects the industry from the infrastructure being captured. Thank you. We have time for questions."
]
</script>

    ["s1", window.Slide01],

  // Replace each placeholder section with the slide's own <section>.
  // Each Slide component renders its own <section data-screen-label=...>.
  // We render into a wrapper div and then swap.
  for (const [id, Comp] of mounts) {
    const placeholder = document.getElementById(id);
    if (!placeholder || !Comp) continue;
